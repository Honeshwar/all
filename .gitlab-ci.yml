stages:
  - clone
  - sonarqube-check
  - build+tag+push+remove
  - change_deployment_file
  - deploy
  - rollback

variables:
  IMAGE_NAME: ""
  IMAGE_TAG: "latest"
  DATE_TAG: "${CI_PIPELINE_ID}"
  REPORT_FILE: "report_${DATE_TAG}.json"
  ARGO_SERVER: "deploycd.tailnode.com"
  ARGO_USERNAME: "admin"
  ARGO_PASS: "Argocd#05042023@@new#"
  APPLICATION: ""
  PROJECT: ""
  DEST_CLUSTER: ""
  HELM_DIR: ""
  CD_BRANCH: "$CI_COMMIT_BRANCH"
  NAMESPACE: ""
  ARGOREPO: ""
  TRIVYURL: ""
  VALUES_FILE_NAME: ""
  VALUES_FILE_LOCATION: ""
  GIT_PUSH_REPO: ""
  HEAD: ""

clone_repository:
  stage: clone
  script:
    - git clone ${CI_REPOSITORY_URL} 
    - echo "Repository cloned successfully."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'



sonarqube-check:
  stage: sonarqube-check
  tags:
    - gitlab-pipeline-runner  # name of gitlab runner tag
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0" 
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=sqp_861f32e3acf5acc02f9ee72f53273e268df910b7
  allow_failure: true
  only:
    variables:
    - $CI_PIPELINE_SOURCE == "merge_request_event"
    - $CI_PIPELINE_SOURCE == "push"
  except:
    variables:
      - $GITLAB_USER_EMAIL == "devops.tech@tailnode.com" || $GITLAB_USER_EMAIL == "vasu.sachdeva9@gmail.com" 
      - $CI_PIPELINE_SOURCE == "web"



build+tag+push+remove:
  stage: build+tag+push+remove
  image: bentolor/docker-dind-awscli
  services:
    - docker:dind
  script:
    - |
      if [[ "$DEPLOY_ENV" == "beta" ]]; then
        export IMAGE_NAME="888520271636.dkr.ecr.ap-south-1.amazonaws.com/dhruv-dr-nextjs-beta"
      elif [[ "$DEPLOY_ENV" == "preprod" ]]; then
        export IMAGE_NAME="888520271636.dkr.ecr.ap-south-1.amazonaws.com/dhruv-dr-nextjs-preprod"
      elif [[ "$DEPLOY_ENV" == "prod" ]]; then
        export IMAGE_NAME="888520271636.dkr.ecr.ap-south-1.amazonaws.com/dhruv-dr-nextjs-prod"
      else
        echo "Unsupported DEPLOY_ENV: $DEPLOY_ENV"
        exit 1
      fi  
      docker build -t ${IMAGE_NAME}:latest .
      docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:$DATE_TAG
      aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
      aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
      aws configure set default.region ap-south-1
      aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 888520271636.dkr.ecr.ap-south-1.amazonaws.com
      docker push $IMAGE_NAME:$DATE_TAG
      docker rmi $IMAGE_NAME:$DATE_TAG
      docker rmi $IMAGE_NAME:latest
      echo "Unused Docker images removed."  

  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

